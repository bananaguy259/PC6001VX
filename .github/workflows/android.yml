name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Install Qt
        run: |
          pip install aqtinstall

          python -m aqt install-qt linux android 5.15.2 android \
            -m qtbase \
            --outputdir $HOME/Qt

      - name: Add Qt to PATH
        run: |
          echo "$HOME/Qt/5.15.2/android/bin" >> $GITHUB_PATH

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            make

      - name: Build APK
        run: |
          mkdir build
          cd build

          $HOME/Qt/5.15.2/android/bin/qmake ../PC6001VX.pro \
            ANDROID_ABIS="armeabi-v7a"

          make -j$(nproc)

          $HOME/Qt/5.15.2/android/bin/androiddeployqt \
            --input android-libPC6001VX.so-deployment-settings.json \
            --output android-build \
            --android-platform android-34 \
            --gradle \
            --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PC6001VX-APK
          path: |
            build/android-build/build/outputs/apk/**/*.apk
